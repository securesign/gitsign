version: "2"
run:
  issues-exit-code: 1
linters:
  enable:
    - asciicheck
    - errorlint
    - gocritic
    - gosec
    - importas
    - misspell
    - prealloc
    - revive
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - staticcheck
        text: 'SA1019: package golang.org/x/crypto/openpgp'
      - linters:
          - staticcheck
        text: 'SA1019: swag\.'
      - linters:
          - staticcheck
        text: 'SA1019: in_toto\.'
      - linters:
          - gocritic
        text: 'deprecatedComment'
    paths:
      - internal/fork
      - third_party$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - internal/fork
      - third_party$
      - examples$
